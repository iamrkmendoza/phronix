<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phronix — Login</title>
  <link rel="icon" type="image/png" href="phronix.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-overlay">
    <div class="login-particles"></div>
    <div class="login-card">
      <div class="login-brand">
        <img src="phronix.png" alt="Phronix" class="login-logo">
        <h1 class="login-title">Phronix</h1>
        <p class="login-tagline">Focus. <span class="orange">Earn.</span> Level up.</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="login-field">
          <label for="loginName">Display Name</label>
          <input type="text" id="loginName" placeholder="Enter your name" required maxlength="30">
        </div>
        <div class="login-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="login-btn">&#9889; Start Your Journey</button>
      </form>
      <p class="login-version">v1.0</p>
    </div>
  </div>
  <script>
    if(localStorage.getItem('phronix_profile')){window.location.href='index.html';}
    function genInit(n){var p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.trim().substring(0,2).toUpperCase();}
    document.getElementById('loginForm').addEventListener('submit',function(e){
      e.preventDefault();
      var name=document.getElementById('loginName').value.trim();
      var email=document.getElementById('loginEmail').value.trim();
      if(!name||!email)return;
      var ini=genInit(name);
      var profile={displayName:name,initials:ini,fullName:name,email:email,totalXp:0,level:1,streak:0,bestStreak:0,focusTimeMin:0,focusSessions:0,longestSession:0,questsDone:0,earlyComplete:0,notifications:true,sound:true};
      var quests=[
        {id:1,name:'INTE 202 - Quizzes',diff:'MEDIUM',xp:150,progress:80,notes:'Quiz 1, Quiz 2, Quiz 3, Quiz 4, Quiz 5',status:'active',deadline:'2026-06-01',checklist:[{t:'Quiz 1',d:true},{t:'Quiz 2',d:true},{t:'Quiz 3',d:true},{t:'Quiz 4',d:true},{t:'Quiz 5',d:false}]},
        {id:2,name:'COMP 014 - Lab Activities',diff:'MEDIUM',xp:150,progress:80,notes:'Lab exercises and submissions',status:'active',deadline:'2026-05-30',checklist:[{t:'Lab 1',d:true},{t:'Lab 2',d:true},{t:'Lab 3',d:true},{t:'Lab 4',d:true},{t:'Lab 5',d:false}]},
        {id:3,name:'COMP 013 - UI/UX Design',diff:'HARD',xp:200,progress:100,notes:'Design project completed',status:'active',deadline:'2026-05-20',checklist:[{t:'Wireframes',d:true},{t:'Mockups',d:true},{t:'Prototype',d:true}]},
        {id:4,name:'COMP 010 - Final Presentation',diff:'HARD',xp:200,progress:100,notes:'Presentation slides done',status:'active',deadline:'2026-05-25',checklist:[{t:'Outline',d:true},{t:'Slides',d:true},{t:'Rehearsal',d:true}]},
        {id:5,name:'COMP 009 - Final Presentation',diff:'HARD',xp:200,progress:0,notes:'',status:'active',deadline:'2026-05-28',checklist:[{t:'Research',d:false},{t:'Slides',d:false},{t:'Practice',d:false}]}
      ];
      localStorage.setItem('phronix_profile',JSON.stringify(profile));
      localStorage.setItem('phronix_quests',JSON.stringify(quests));
      localStorage.setItem('phronix_weeklyXp',JSON.stringify({Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0}));
      localStorage.setItem('phronix_daily',JSON.stringify({date:new Date().toISOString().slice(0,10),done:{}}));
      localStorage.setItem('phronix_recent',JSON.stringify([{text:'Welcome to Phronix!',sub:'Account created \u00b7 just now',xp:0}]));
      localStorage.setItem('phronix_board',JSON.stringify([
        {name:name+' (you)',initials:ini,sub:'Lv. 1',xp:0,you:true,rank:1},
        {name:'PhronixBot',initials:'PB',sub:'Lv. 5',xp:2500,you:false,rank:2},
        {name:'StudyBuddy',initials:'SB',sub:'Lv. 3',xp:800,you:false,rank:3}
      ]));
      window.location.href='index.html';
    });
  </script>
</body>
</html>
