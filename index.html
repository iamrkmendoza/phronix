<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phronix — Redirecting...</title>
  <script>
    // Clear all localStorage when accessing the root index.html
    // This ensures a fresh login experience every time
    localStorage.clear();
    
    // Redirect to login.html immediately
    window.location.href = 'login.html';
  </script>
</head>
<body>
  <p style="font-family: Arial; text-align: center; margin-top: 50px; color: #666;">
    Redirecting to login...
  </p>
</body>
</html>
