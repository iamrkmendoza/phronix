<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phronix — Login</title>
  <link rel="icon" type="image/png" href="phronix.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-overlay">
    <div class="login-particles"></div>
    <div class="login-card">
      <div class="login-brand">
        <img src="phronix.png" alt="Phronix" class="login-logo">
        <h1 class="login-title">Phronix</h1>
        <p class="login-tagline">Focus. <span class="orange">Earn.</span> Level up.</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="login-field">
          <label for="loginName">Display Name</label>
          <input type="text" id="loginName" placeholder="Enter your name" required maxlength="30">
        </div>
        <div class="login-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="login-btn">&#9889; Start Your Journey</button>
      </form>
      <p class="login-version">v1.0</p>
    </div>
  </div>

  <script>
   
  </script>
</body>
</html>
